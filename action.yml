name: 'SSO Mocker'
description: 'Start a configurable OIDC mock provider for CI testing'
branding:
  icon: 'lock'
  color: 'blue'

inputs:
  environment:
    description: 'Config environment (development, integration, staging)'
    default: 'integration'
  port:
    description: 'HTTP port'
    default: '9090'
  login-mode:
    description: 'Login mode: auto (CI, zero interaction) or form (user picker)'
    default: 'auto'
  auto-login-user:
    description: 'User ID for auto-login mode'
    default: 'alice'
  config:
    description: 'Path to custom config directory (contains default.yaml, {env}.yaml, {env}.users.yaml)'
    default: ''
  node-version:
    description: 'Node.js version'
    default: '22'

outputs:
  issuer:
    description: 'OIDC issuer URL (use as OIDC_ISSUER env var in your tests)'
    value: ${{ steps.start.outputs.issuer }}

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Build SSO Mocker
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm run build

    - name: Start SSO Mocker
      id: start
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH"
        CONFIG_FLAG=""
        if [ -n "$SSO_CONFIG_DIR" ]; then
          CONFIG_FLAG="--config $GITHUB_WORKSPACE/$SSO_CONFIG_DIR"
        fi
        node bin/sso-mocker.js start \
          --env ${{ inputs.environment }} \
          --port ${{ inputs.port }} \
          --login-mode ${{ inputs.login-mode }} \
          $CONFIG_FLAG &
        echo "Waiting for SSO Mocker to be ready..."
        timeout 30 bash -c 'until curl -sf http://localhost:${{ inputs.port }}/health > /dev/null 2>&1; do sleep 1; done'
        echo "SSO Mocker ready at http://localhost:${{ inputs.port }}"
        echo "issuer=http://localhost:${{ inputs.port }}" >> $GITHUB_OUTPUT
      env:
        SSO_MOCKER_AUTO_LOGIN_USER: ${{ inputs.auto-login-user }}
        SSO_CONFIG_DIR: ${{ inputs.config }}
