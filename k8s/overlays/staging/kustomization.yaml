apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ingress.yaml
patches:
  - target:
      kind: Deployment
      name: sso-mocker
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: sso-mocker-config
    patch: |-
      - op: replace
        path: /data/environment
        value: staging
