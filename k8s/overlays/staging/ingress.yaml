apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sso-mocker
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
    - host: sso-mocker.staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sso-mocker
                port:
                  number: 9090
